<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradient Helper - Shader Config Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            color: #555;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .color-inputs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 15px;
        }

        .color-input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .color-input-group label {
            margin-bottom: 0;
            font-size: 12px;
        }

        input[type="color"] {
            width: 100%;
            height: 60px;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        input[type="color"]:hover {
            border-color: #667eea;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .range-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-generate {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-reset {
            background: #f0f0f0;
            color: #333;
        }

        .btn-reset:hover {
            background: #e0e0e0;
        }

        .output-section {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #eee;
        }

        .output-box {
            background: #f8f9fa;
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            word-break: break-all;
            white-space: pre-wrap;
        }

        .copy-btn {
            background: #667eea;
            color: white;
            padding: 8px 16px;
            font-size: 12px;
            width: 100%;
            margin-bottom: 10px;
        }

        .copy-btn:hover {
            background: #764ba2;
        }

        .preview {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            height: 40px;
        }

        .preview-color {
            flex: 1;
            border-radius: 6px;
            border: 2px solid #ddd;
        }

        .info-text {
            color: #888;
            font-size: 12px;
            margin-top: 5px;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }

        .success-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Gradient Helper</h1>
        
        <div class="success-message" id="successMessage">
            ✓ Copied to clipboard!
        </div>

        <form id="gradientForm">
            <!-- Trigger Color -->
            <div class="form-group">
                <label>Trigger Color (Hex)</label>
                <input type="text" id="triggerColor" placeholder="#E03009" maxlength="7" value="#E03009">
                <div class="info-text">The color code that activates this gradient</div>
            </div>

            <!-- Color Picker -->
            <div class="form-group">
                <label>Gradient Colors (Pick 3)</label>
                <div class="color-inputs">
                    <div class="color-input-group">
                        <label>Color 1</label>
                        <input type="color" id="color1" value="#c90238">
                    </div>
                    <div class="color-input-group">
                        <label>Color 2</label>
                        <input type="color" id="color2" value="#600026">
                    </div>
                    <div class="color-input-group">
                        <label>Color 3</label>
                        <input type="color" id="color3" value="#e03009">
                    </div>
                </div>
                <div class="preview" id="preview">
                    <div class="preview-color"></div>
                    <div class="preview-color"></div>
                    <div class="preview-color"></div>
                </div>
            </div>

            <!-- Angle and Speed -->
            <div class="form-group" style="display: none;">
                <div class="range-inputs">
                    <div>
                        <label for="angle">Angle</label>
                        <input type="number" id="angle" value="45">
                    </div>
                    <div>
                        <label for="speed">Speed</label>
                        <input type="number" id="speed" value="1000">
                    </div>
                </div>
            </div>

            <!-- Buttons -->
            <div class="button-group">
                <button type="button" class="btn-generate" onclick="generateConfigs()">Generate Configs</button>
                <button type="reset" class="btn-reset">Reset</button>
            </div>
        </form>

        <!-- Output Section -->
        <div class="output-section" id="outputSection" style="display: none;">
            <h3 style="margin-bottom: 15px; color: #333;">Generated Code</h3>
            
            <div>
                <label style="display: block; margin-bottom: 10px; font-weight: 600; color: #555;">rendertype_text.vsh</label>
                <button type="button" class="copy-btn" onclick="copyToClipboard('vshOutput')">Copy VSH Code</button>
                <div class="output-box" id="vshOutput"></div>
            </div>

            <div>
                <label style="display: block; margin-bottom: 10px; font-weight: 600; color: #555; margin-top: 20px;">text_effects_config.glsl</label>
                <button type="button" class="copy-btn" onclick="copyToClipboard('glslOutput')">Copy GLSL Code</button>
                <div class="output-box" id="glslOutput"></div>
            </div>

            <div>
                <label style="display: block; margin-bottom: 10px; font-weight: 600; color: #555; margin-top: 20px;">rendertype_text.fsh</label>
                <button type="button" class="copy-btn" onclick="copyToClipboard('fshOutput')">Copy FSH Code</button>
                <div class="output-box" id="fshOutput"></div>
            </div>
        </div>
    </div>

    <script>
        // Existing case values (calculated with /4 rounding)
        const EXISTING_CASES = {
            0x38C03E: '#E03009', // 224, 48, 9
            0x2E1A3D: '#BE1AF5', // 190, 26, 245
            0x07A37E: '#1F7AFE'  // 31, 122, 254
        };

        function randomColor() {
            return '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0').toUpperCase();
        }

        function randomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function updatePreview() {
            const colors = document.querySelectorAll('.preview-color');
            colors[0].style.backgroundColor = document.getElementById('color1').value;
            colors[1].style.backgroundColor = document.getElementById('color2').value;
            colors[2].style.backgroundColor = document.getElementById('color3').value;
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : null;
        }

        function rgbToHex(r, g, b) {
            return "0x" + [r, g, b].map(x => {
                const hex = x.toString(16);
                return hex.length === 1 ? "0" + hex : hex;
            }).join('').toUpperCase();
        }

        function calculateCaseValue(r, g, b) {
            return ((Math.floor(r / 4) << 16) | (Math.floor(g / 4) << 8) | Math.floor(b / 4));
        }

        function generateConfigs() {
            const triggerColor = document.getElementById('triggerColor').value;
            const color1 = document.getElementById('color1').value;
            const color2 = document.getElementById('color2').value;
            const color3 = document.getElementById('color3').value;
            const angle = document.getElementById('angle').value;
            const speed = document.getElementById('speed').value;

            // Validate trigger color
            if (!/^#[0-9A-F]{6}$/i.test(triggerColor)) {
                alert('Invalid trigger color format. Use #RRGGBB');
                return;
            }

            // Check for duplicate case labels (due to /4 rounding)
            const triggerRgb = hexToRgb(triggerColor);
            const caseValue = calculateCaseValue(triggerRgb.r, triggerRgb.g, triggerRgb.b);
            
            if (EXISTING_CASES.hasOwnProperty(caseValue)) {
                alert('⚠️ DUPLICATE DETECTED!\n\nThis color (' + triggerColor + ') creates the same case label as ' + EXISTING_CASES[caseValue] + '\n\nThe /4 rounding in the shader causes this collision.\n\nTry adjusting the color slightly.');
                return;
            }

            // Convert colors to hex format
            const triggerHex = triggerColor.replace('#', '0x').toUpperCase();
            const color1Hex = rgbToHex(hexToRgb(color1).r, hexToRgb(color1).g, hexToRgb(color1).b);
            const color2Hex = rgbToHex(hexToRgb(color2).r, hexToRgb(color2).g, hexToRgb(color2).b);
            const color3Hex = rgbToHex(hexToRgb(color3).r, hexToRgb(color3).g, hexToRgb(color3).b);

            // Convert colors to RGB for GLSL
            const rgb1 = hexToRgb(color1);
            const rgb2 = hexToRgb(color2);
            const rgb3 = hexToRgb(color3);

            // Generate VSH code
            const vshCode = `registerGradient(${triggerHex},${color1Hex},${color2Hex},${color3Hex},${speed}.0,${angle}.0);`;

            // Generate GLSL code - match exact format from existing entries
            const glslCode = `TEXT_EFFECT(${triggerRgb.r}, ${triggerRgb.g}, ${triggerRgb.b}) { // ${triggerColor}
    apply_gradient_3(rgb(${rgb1.r}, ${rgb1.g}, ${rgb1.b}), rgb(${rgb2.r}, ${rgb2.g}, ${rgb2.b}), rgb(${rgb3.r}, ${rgb3.g}, ${rgb3.b}), ${(speed / 1000).toFixed(1)});
    textData.shouldScale = true;
}`;

            // Generate FSH code
            const fshCode = `} else if(iColor == ivec3(${triggerRgb.r},${triggerRgb.g},${triggerRgb.b})) {
        grad.colors[0] = hexToRgb(${color1Hex});
        grad.colors[1] = hexToRgb(${color2Hex});
        grad.colors[2] = hexToRgb(${color3Hex});
        grad.colorCount = 3;
        grad.speed = ${speed}.0;
        grad.angle = ${angle}.0;
        foundGradient = true;`;

            // Display outputs
            document.getElementById('vshOutput').textContent = vshCode;
            document.getElementById('glslOutput').textContent = glslCode;
            document.getElementById('fshOutput').textContent = fshCode;
            document.getElementById('outputSection').style.display = 'block';
        }

        function copyToClipboard(elementId) {
            const element = document.getElementById(elementId);
            const text = element.textContent;
            
            navigator.clipboard.writeText(text).then(() => {
                const message = document.getElementById('successMessage');
                message.classList.add('show');
                setTimeout(() => {
                    message.classList.remove('show');
                }, 2000);
            });
        }

        function randomizeAll() {
            document.getElementById('triggerColor').value = randomColor();
            document.getElementById('color1').value = randomColor();
            document.getElementById('color2').value = randomColor();
            document.getElementById('color3').value = randomColor();
            updatePreview();
        }

        // Initialize with random values on page load
        window.addEventListener('load', () => {
            randomizeAll();
        });

        // Update preview colors
        document.getElementById('color1').addEventListener('change', updatePreview);
        document.getElementById('color2').addEventListener('change', updatePreview);
        document.getElementById('color3').addEventListener('change', updatePreview);
    </script>
</body>
</html>
